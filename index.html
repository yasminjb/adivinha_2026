<!DOCTYPE html>
<html lang="pt-br" >
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jogo de Adivinhação </title>

        <style>
            .corpoDaPagina{
                font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                background-color:rgba(211, 213, 226, 0.815);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            h1{
                color:rgba(61, 82, 139, 0.918)
            }

            .container{
                text-align: center;
                background-color: rgba(153, 165, 202, 0.795); 
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rbg(0, 0, 0, 0.5);             
            }

            input[type="number"]{
                padding: 1px;
                font-size: 16px;
                width: 50px;
                margin-bottom: 10px;
            }

            button{
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
                background-color:rgba(69, 104, 180, 0.877);
                color:rgba(211, 213, 226, 0.815);
                border: none;
                border-radius: 5px
            }

            .message{
                margin-top: 20px;
                font-size: 18px;
                color:rgb(252, 252, 252)

            }

            p{
                color:rgb(240, 244, 255)
            }

        </style>

    </head>

    <body class="corpoDaPagina">
        <div class="container">
            <h1>Jogo de Adivinhação &#128173;</h1>
            <p>Tente adivinhar o número secreto entre 1 e 100</p>
            <input type="number" id="TXTPalpite" min="1" max="100"/>
            <button id="BTNAdivinha" onclick="verificarPalpite()">Adivinhar</button>
            <div class="message" id="DIVMensagem"></div>
       </div>
    </body>

    <script>

        function verificarPalpite(){
            //---------------------------------
            //1° Verificar se o jogador digitou 
            //   algum numero na caixa de texto
            //---------------------------------
            let caixaDeTexto = document.getElementById('TXTPalpite');
            let dvMensagem = document.getElementById('TXTPalpite');
            
            let chuteDoJogador = parseInt(caixaDeTexto.value);
            
        
            if( isNaN(chuteDoJogador) ){
                dvMensagem.textContent = 'Número Inválido!!';
            }else{
                dvMensagem.textContent = 'Número Válido: '+chuteDoJogador;
            }

          
         }

    

    </script>



</html>
